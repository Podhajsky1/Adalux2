<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2d4a2d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Adalux">
<link rel="manifest" href="/static/manifest.json">
<title>Adalux – Průvodkyně</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Source Sans 3',sans-serif; background:#f5f0e8; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  .header { background:#2d4a2d; padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .header-avatar { width:42px; height:42px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .header-text h1 { font-family:'Playfair Display',serif; color:white; font-size:1.2rem; }
  .header-text p { color:#a8c8a8; font-size:0.75rem; }
  .hlas-btn { margin-left:auto; background:rgba(255,255,255,0.15); border:none; color:white; padding:6px 12px; border-radius:20px; font-size:0.8rem; cursor:pointer; }

  .quick-btns { display:flex; gap:8px; padding:10px 12px; overflow-x:auto; flex-shrink:0; background:#e8e0d0; scrollbar-width:none; }
  .quick-btns::-webkit-scrollbar { display:none; }
  .quick-btn { background:#2d4a2d; color:white; border:none; padding:7px 14px; border-radius:20px; font-size:0.8rem; white-space:nowrap; cursor:pointer; font-family:'Source Sans 3',sans-serif; }

  .messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; }
  .message { display:flex; gap:8px; animation:slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction:row-reverse; }
  .msg-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:2px; }
  .message.assistant .msg-avatar { background:linear-gradient(135deg,#2d4a2d,#4a7c4a); }
  .message.user .msg-avatar { background:#c8973a; color:white; font-size:11px; font-weight:600; }
  .bubble { max-width:80%; padding:10px 14px; border-radius:18px; font-size:0.92rem; line-height:1.5; }
  .message.assistant .bubble { background:white; color:#1e2e1e; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
  .message.user .bubble { background:#2d4a2d; color:#e8f0e8; border-bottom-right-radius:4px; }

  .typing { display:flex; gap:5px; padding:10px 14px; background:white; border-radius:18px; border-bottom-left-radius:4px; width:60px; }
  .typing span { width:7px; height:7px; background:#7ab87a; border-radius:50%; animation:bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  .input-area { background:white; padding:10px 12px; display:flex; gap:8px; align-items:center; flex-shrink:0; border-top:1px solid #e0d8cc; padding-bottom:max(10px, env(safe-area-inset-bottom)); }
  #userInput { flex:1; border:1.5px solid #ccc; border-radius:22px; padding:10px 16px; font-size:0.95rem; font-family:'Source Sans 3',sans-serif; outline:none; background:#fafafa; }
  #userInput:focus { border-color:#4a7c4a; }
  .send-btn, .mic-btn { width:42px; height:42px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:transform 0.15s; }
  .send-btn { background:#2d4a2d; color:white; }
  .mic-btn { background:#4a7c4a; color:white; }
  .send-btn:active, .mic-btn:active { transform:scale(0.92); }
  .mic-btn.recording { background:#c0392b; animation:pulse-red 1s infinite; }
  @keyframes pulse-red{0%,100%{opacity:1}50%{opacity:0.6}}
</style>
</head>
<body>

<div class="header">
  <div class="header-avatar">🏡</div>
  <div class="header-text">
    <h1>Adalux</h1>
    <p>Turistická průvodkyně</p>
  </div>
  <button class="hlas-btn" id="hlasBtn" onclick="toggleHlas()">🔊 Hlas</button>
</div>

<div class="quick-btns">
  <button class="quick-btn" onclick="quickSend('Kdy jede příští autobus?')">🚌 Autobus</button>
  <button class="quick-btn" onclick="quickSend('Jaké jsou zajímavosti?')">🏰 Zajímavosti</button>
  <button class="quick-btn" onclick="quickSend('Kde se mohu najíst?')">🍽️ Restaurace</button>
  <button class="quick-btn" onclick="quickSend('Jaké turistické trasy vedou odsud?')">🥾 Trasy</button>
  <button class="quick-btn" onclick="quickSend('Kde je parkování?')">🅿️ Parkování</button>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Zeptejte se Adalux..." onkeydown="if(event.key==='Enter')sendMessage()">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
let history = [];
let hlasZapnut = true;
let recognition = null;
let nahrava = false;

function addMessage(text, kdo) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${kdo}`;
  const avatar = kdo === 'assistant' ? '🏡' : 'Ty';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🏡</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const msg = text || input.value.trim();
  if(!msg) return;
  if(!text) input.value = '';

  addMessage(msg, 'user');
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, history: history})
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.reply, 'assistant');
    history.push({role:'user',content:msg});
    history.push({role:'assistant',content:data.reply});
    if(history.length > 20) history = history.slice(-20);

    if(hlasZapnut) speakText(data.reply);
  } catch(e) {
    removeTyping();
    addMessage('Jejda, něco se pokazilo. Zkus to znovu! 😅', 'assistant');
  }
}

function quickSend(text) { sendMessage(text); }

function toggleHlas() {
  hlasZapnut = !hlasZapnut;
  document.getElementById('hlasBtn').textContent = hlasZapnut ? '🔊 Hlas' : '🔇 Ticho';
  if(!hlasZapnut) window.speechSynthesis?.cancel();
}

function speakText(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/\*\*?(.*?)\*\*?/g,'$1').replace(/[-•]\s/g,'').slice(0,500);
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'cs-CZ'; u.rate = 1.05; u.pitch = 1.15;
  const voices = speechSynthesis.getVoices();
  const female = voices.find(v => v.lang.startsWith('cs') && /zuzana|helena|female/i.test(v.name))
               || voices.find(v => v.lang.startsWith('cs'));
  if(female) u.voice = female;
  speechSynthesis.speak(u);
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { alert('Váš prohlížeč nepodporuje mikrofon. Zkuste Chrome.'); return; }
  if(nahrava) {
    recognition?.stop();
    return;
  }
  recognition = new SR();
  recognition.lang = 'cs-CZ';
  recognition.interimResults = false;
  nahrava = true;
  document.getElementById('micBtn').className = 'mic-btn recording';
  document.getElementById('micBtn').textContent = '⏹';
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('userInput').value = text;
    sendMessage(text);
  };
  recognition.onend = () => {
    nahrava = false;
    document.getElementById('micBtn').className = 'mic-btn';
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.start();
}

// Uvítání
window.onload = () => {
  addMessage('Ahoj! Jsem Adalux, vaše průvodkyně. 🌿\nZeptejte se na cokoliv – nebo klikněte na 🎤 a mluvte!', 'assistant');
  if(window.speechSynthesis) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
};

// PWA service worker
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}
</script>
</body>
</html>
